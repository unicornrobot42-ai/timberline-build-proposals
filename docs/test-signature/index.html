<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Signature - Timberline Build Co</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #19412c; margin-bottom: 8px; font-size: 24px; }
    .amount { color: #614432; font-size: 32px; font-weight: 700; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; color: #333; }
    input[type="text"], input[type="email"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; }
    input:focus { outline: none; border-color: #19412c; }
    .checkbox-group { display: flex; align-items: flex-start; gap: 12px; margin: 24px 0; padding: 16px; background: #f9f9f9; border-radius: 8px; }
    .checkbox-group input { width: 20px; height: 20px; margin-top: 2px; }
    .checkbox-group label { margin: 0; font-size: 14px; line-height: 1.4; }
    button { width: 100%; padding: 16px; background: #19412c; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; font-family: inherit; }
    button:hover { background: #0f2a1c; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .signed { text-align: center; padding: 40px 20px; }
    .signed h2 { color: #19412c; margin-bottom: 16px; }
    .signed .checkmark { font-size: 64px; margin-bottom: 16px; }
    .signed-details { background: #f0f7f0; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: left; }
    .signed-details p { margin: 8px 0; color: #333; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="sign-form">
      <h1>Project Proposal</h1>
      <p style="color:#666; margin-bottom: 16px;">Test Signature Page</p>
      <div class="amount">$15,000</div>
      
      <div class="form-group">
        <label for="name">Full Legal Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      
      <div class="checkbox-group">
        <input type="checkbox" id="agree">
        <label for="agree">I have reviewed this proposal and agree to the scope of work, timeline, and payment terms as described. By typing my name above, I am providing my electronic signature.</label>
      </div>
      
      <button id="sign-btn" disabled>Sign Proposal</button>
    </div>
    
    <div id="signed-view" class="signed hidden">
      <div class="checkmark">✓</div>
      <h2>Proposal Signed</h2>
      <p>Thank you! Your signature has been recorded.</p>
      <div class="signed-details">
        <p><strong>Signed by:</strong> <span id="signed-name"></span></p>
        <p><strong>Email:</strong> <span id="signed-email"></span></p>
        <p><strong>Date:</strong> <span id="signed-date"></span></p>
      </div>
    </div>
  </div>

  <script>
    const PROPOSAL_ID = 'test-signature';
    const STORAGE_KEY = 'timberline_signatures';
    
    // Check if already signed
    function getSignatures() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch { return {}; }
    }
    
    function checkSigned() {
      const sigs = getSignatures();
      if (sigs[PROPOSAL_ID]) {
        showSigned(sigs[PROPOSAL_ID]);
      }
    }
    
    function showSigned(sig) {
      document.getElementById('sign-form').classList.add('hidden');
      document.getElementById('signed-view').classList.remove('hidden');
      document.getElementById('signed-name').textContent = sig.name;
      document.getElementById('signed-email').textContent = sig.email;
      document.getElementById('signed-date').textContent = sig.date;
    }
    
    function saveSignature(name, email) {
      const sigs = getSignatures();
      const date = new Date().toLocaleString('en-US', {
        timeZone: 'America/Los_Angeles',
        dateStyle: 'long',
        timeStyle: 'short'
      });
      sigs[PROPOSAL_ID] = { name, email, date, amount: '$15,000' };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sigs));
      
      // Also try to send to backend (fire and forget)
      fetch('https://estimate.timberlinebuild.co/api/sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, proposal: PROPOSAL_ID, amount: '$15,000' })
      }).catch(() => {});
      
      showSigned(sigs[PROPOSAL_ID]);
    }
    
    // Enable button when form is valid
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const agreeCheckbox = document.getElementById('agree');
    const signBtn = document.getElementById('sign-btn');
    
    function updateButton() {
      signBtn.disabled = !(nameInput.value.trim() && emailInput.value.trim() && agreeCheckbox.checked);
    }
    
    nameInput.addEventListener('input', updateButton);
    emailInput.addEventListener('input', updateButton);
    agreeCheckbox.addEventListener('change', updateButton);
    
    signBtn.addEventListener('click', () => {
      saveSignature(nameInput.value.trim(), emailInput.value.trim());
    });
    
    checkSigned();
  </script>
</body>
</html>
